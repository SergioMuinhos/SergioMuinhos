<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Styles & Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      
      .term-text {
        font-family: 'JetBrains Mono', -apple-system, BlinkMacSystemFont, monospace;
        font-size: 13px;
        fill: #c9d1d9;
        font-weight: 400;
      }
      
      .prompt-user {
        fill: #58a6ff;
        font-weight: 700;
      }
      
      .prompt-host {
        fill: #8b949e;
      }
      
      .prompt-dir {
        fill: #bc8cff;
      }
      
      .prompt-cmd {
        fill: #ff7b72;
      }
      
      .json-key {
        fill: #79c0ff; /* Cyan-blue keys */
      }
      
      .json-string {
        fill: #a5d6ff; /* Soft green-blue strings */
      }
      
      .json-array {
        fill: #ff7b72; /* Orange brackets */
      }
      
      .json-braces {
        fill: #ff7b72;
      }
      
      .cursor {
        fill: #58a6ff;
        animation: blink 1s infinite;
      }
      
      .graph-line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Blinking cursor animation */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      /* Subtle hover effect on nodes */
      .graph-node {
        transition: transform 0.2s ease, r 0.2s ease;
        cursor: pointer;
      }
      .graph-node:hover {
        transform: scale(1.3);
        r: 6px;
      }
    </style>
  </defs>

  <!-- Background Base (Matches GitHub Dark Theme) -->
  <rect width="100%" height="100%" fill="#0d1117" />

  <!-- Terminal Window Mockup -->
  <rect x="20" y="15" width="760" height="210" rx="8" ry="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  
  <!-- Window Header / Title Bar -->
  <g id="window-controls">
    <!-- Red, Yellow, Green Window Dots -->
    <circle cx="45" cy="33" r="5" fill="#ff5f56" />
    <circle cx="60" cy="33" r="5" fill="#ffbd2e" />
    <circle cx="75" cy="33" r="5" fill="#27c93f" />
    
    <!-- Title Text -->
    <text x="400" y="38" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">bash — sergio@github: ~/profile (v1.2.0)</text>
  </g>
  
  <!-- Window Divider Line -->
  <line x1="20" y1="50" x2="780" y2="50" stroke="#30363d" stroke-width="1" />

  <!-- Git Graph (Left Panel Decoration - The Geeky Touch) -->
  <g id="git-graph" transform="translate(15, 0)">
    <!-- Branch Paths -->
    <!-- main branch line (green) -->
    <line x1="60" y1="65" x2="60" y2="210" stroke="#3fb950" stroke-width="2.5" class="graph-line" />
    
    <!-- feature/iot branch line (orange) -->
    <path d="M 60,75 C 80,85 90,95 90,110 C 90,125 80,135 60,145" stroke="#db6d28" stroke-width="2" fill="none" class="graph-line" />
    
    <!-- feature/cloud branch line (purple) -->
    <path d="M 60,125 C 90,135 115,145 115,160 C 115,175 90,185 60,195" stroke="#bc8cff" stroke-width="2" fill="none" class="graph-line" />

    <!-- Commits (Nodes) -->
    <!-- main commits -->
    <circle cx="60" cy="65" r="4.5" fill="#3fb950" stroke="#161b22" stroke-width="1.5" class="graph-node" />
    <circle cx="60" cy="125" r="4.5" fill="#3fb950" stroke="#161b22" stroke-width="1.5" class="graph-node" />
    <circle cx="60" cy="210" r="4.5" fill="#3fb950" stroke="#161b22" stroke-width="1.5" class="graph-node" />
    
    <!-- feature commits -->
    <circle cx="90" cy="110" r="4" fill="#db6d28" stroke="#161b22" stroke-width="1.5" class="graph-node" />
    <circle cx="115" cy="160" r="4" fill="#bc8cff" stroke="#161b22" stroke-width="1.5" class="graph-node" />
    
    <!-- Graph Text labels -->
    <text x="75" y="69" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8b949e" opacity="0.5">main</text>
    <text x="102" y="114" font-family="'JetBrains Mono', monospace" font-size="9" fill="#db6d28" opacity="0.6">feat/iot</text>
    <text x="127" y="164" font-family="'JetBrains Mono', monospace" font-size="9" fill="#bc8cff" opacity="0.6">feat/cloud</text>
  </g>

  <!-- Code/Terminal Workspace (Right Panel) -->
  <g transform="translate(180, 0)">
    <!-- Line 1: Command Prompt -->
    <text x="0" y="75" class="term-text">
      <tspan class="prompt-user">sergio</tspan><tspan class="prompt-host">@github</tspan>:<tspan class="prompt-dir">~/profile</tspan>$ <tspan class="prompt-cmd">cat</tspan> developer.json
    </text>
    
    <!-- Line 2: JSON Braces Start -->
    <text x="0" y="92" class="term-text">
      <tspan class="json-braces">{</tspan>
    </text>
    
    <!-- Line 3: Name -->
    <text x="20" y="109" class="term-text">
      <tspan class="json-key">"name"</tspan>: <tspan class="json-string">"Sergio Muiños"</tspan>,
    </text>
    
    <!-- Line 4: Role -->
    <text x="20" y="126" class="term-text">
      <tspan class="json-key">"role"</tspan>: <tspan class="json-string">"Full-Stack Engineer &amp; IoT Maker"</tspan>,
    </text>
    
    <!-- Line 5: Stacks -->
    <text x="20" y="143" class="term-text">
      <tspan class="json-key">"stack"</tspan>: <tspan class="json-array">[</tspan><tspan class="json-string">"Java/Spring"</tspan>, <tspan class="json-string">"C#/.NET"</tspan>, <tspan class="json-string">"TS/Angular"</tspan>, <tspan class="json-string">"Docker"</tspan>, <tspan class="json-string">"IoT"</tspan><tspan class="json-array">]</tspan>,
    </text>
    
    <!-- Line 6: Focus -->
    <text x="20" y="160" class="term-text">
      <tspan class="json-key">"focus"</tspan>: <tspan class="json-string">"Cloud Architectures &amp; Quarkus Ecosystem"</tspan>,
    </text>
    
    <!-- Line 7: Location -->
    <text x="20" y="177" class="term-text">
      <tspan class="json-key">"status"</tspan>: <tspan class="json-string">"Building scalable &amp; optimized solutions"</tspan>
    </text>
    
    <!-- Line 8: JSON Braces End -->
    <text x="0" y="194" class="term-text">
      <tspan class="json-braces">}</tspan>
    </text>
    
    <!-- Line 9: Interactive prompt with blinking cursor -->
    <text x="0" y="211" class="term-text">
      <tspan class="prompt-user">sergio</tspan><tspan class="prompt-host">@github</tspan>:<tspan class="prompt-dir">~/profile</tspan>$ <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
